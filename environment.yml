# Conda environment for kan-satellite-fso-qkd (RTX 4090 server, conda-only access).
#
#   conda env create -f environment.yml
#   conda activate satqkd
#
# Phase 0 (analytical + Monte-Carlo) needs only the conda packages below and runs
# on CPU. Phase 3 (KAN training) needs the GPU torch + pykan from the pip section.
# pip is invoked *inside* the conda env, so no system-level permissions are needed.
name: satqkd
channels:
  - conda-forge
dependencies:
  - python=3.11          # 3.11 = broadest wheel coverage for torch/pykan
  - numpy>=1.24
  - scipy>=1.10
  - matplotlib>=3.7
  - pandas>=2.0
  - pytest>=7.0
  # pykan runtime deps (declared here so we can pip-install pykan with --no-deps
  # and avoid it dragging in a wrong-CUDA torch build):
  - scikit-learn>=1.3
  - sympy>=1.12
  - tqdm>=4.65
  - seaborn>=0.12
  - pyyaml>=6.0
  - skyfield>=1.45       # Phase 1: TLE / orbit propagation
  - sgp4>=2.22
  - pip>=23.0
  - pip:
      # IMPORTANT: --index-url (NOT --extra-index-url) so pip pulls torch ONLY
      # from the cu121 channel. With --extra-index-url pip prefers the newest
      # PyPI wheel (built for CUDA 12.6+) and fails on drivers that cap at 12.5.
      # cu121 wheels need driver CUDA >= 12.1. If nvidia-smi shows < 12.1, use cu118.
      - --index-url https://download.pytorch.org/whl/cu121
      - torch
      # pykan is NOT on the cu121 index; install it separately AFTER env creation:
      #   pip install pykan --no-deps
      # (its deps are provided by conda above). See docs/SETUP_CONDA.md.